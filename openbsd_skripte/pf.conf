# /etc/pf.conf
ext_if = "em0"    # Ihr WAN Interface, EXAMPLE

# NUR WireGuard Port öffnen
pass in on $ext_if proto udp from any to any port 51820

# Ausgehende WireGuard Verbindungen erlauben
pass out on $ext_if proto udp from any to any port 51820

# Stateful filtering für etablierte Verbindungen
pass in on $ext_if inet proto udp from any to any port 51820 flags S/SA keep state
