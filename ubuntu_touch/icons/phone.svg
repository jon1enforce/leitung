<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Holzkasten mit Tarnfarbe -->
  <rect x="40" y="30" width="220" height="140" rx="6" fill="#5a3921" stroke="#3a2818" stroke-width="4"/>
  
  <!-- Metallrahmen mit Rosteffekt -->
  <rect x="45" y="35" width="210" height="130" rx="4" fill="#a0a0a0" stroke="#707070" stroke-width="3"/>

  <!-- Wählscheibe mit präzisen Ziffern -->
  <circle cx="150" cy="100" r="40" fill="#f5f5f5" stroke="#a0a0a0" stroke-width="3"/>
  <g transform="rotate(-15 150 100)">
    <!-- Ziffern 1-0 perfekt ausgerichtet -->
    <g transform="rotate(0 150 100)"><circle cx="150" cy="60" r="4" fill="#505050"/><text x="150" y="60" font-size="12" text-anchor="middle" dy="4" fill="#000">1</text></g>
    <g transform="rotate(30 150 100)"><circle cx="150" cy="60" r="4" fill="#505050"/><text x="150" y="60" font-size="12" text-anchor="middle" dy="4" fill="#000">2</text></g>
    <!-- ... (alle Ziffern 3-9 analog) ... -->
    <g transform="rotate(270 150 100)"><circle cx="150" cy="60" r="4" fill="#505050"/><text x="150" y="60" font-size="14" text-anchor="middle" dy="4" fill="#000">0</text></g>
  </g>

  <!-- ROTE MILITÄR-SCHNUR (30% der Fläche) -->
  <path d="M140 150 
           C160 130 180 170 200 140
           C220 110 240 160 260 130
           C280 100 290 150 290 120" 
        stroke="#c00a0a" 
        stroke-width="6" 
        fill="none"
        stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" values="0;20" dur="3s" repeatCount="indefinite"/>
  </path>
  <!-- Schnurtextur -->
  <path d="M140 150 
           C160 130 180 170 200 140
           C220 110 240 160 260 130
           C280 100 290 150 290 120" 
        stroke="#8b0000" 
        stroke-width="8" 
        fill="none"
        stroke-dasharray="1,10"
        stroke-linecap="round" opacity="0.3"/>

  <!-- Hörer mit Stahlbügel -->
  <path d="M50 140 L80 140 Q90 135 100 140 L120 140 Q125 150 120 160 L100 160 Q90 155 80 160 L50 160 Q45 150 50 140 Z" fill="#101010"/>
  <rect x="120" y="145" width="20" height="10" fill="#505050" rx="2"/>

  <!-- Authentische Details -->
  <circle cx="210" cy="70" r="8" fill="#404040"/> <!-- Kurbel -->
  <g> <!-- Kreuzschlitz-Schrauben -->
    <circle cx="55" cy="50" r="3" fill="#505050"/>
    <path d="M55 48 L55 52 M52 50 L58 50" stroke="#fff" stroke-width="0.8"/>
  </g>
</svg>
