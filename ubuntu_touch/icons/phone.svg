<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Holzkasten im Militärlook -->
  <rect x="40" y="30" width="220" height="140" rx="6" fill="#4a3520" stroke="#2a2015" stroke-width="4"/>
  
  <!-- Metallgehäuse mit Kratzern -->
  <rect x="45" y="35" width="210" height="130" rx="4" fill="#909090" stroke="#606060" stroke-width="3">
    <animate attributeName="fill" values="#909090;#a0a0a0;#909090" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- Bedienfeld mit M2Crypto-Logo -->
  <rect x="60" y="50" width="180" height="100" fill="#e0e0e0" stroke="#c0c0c0" stroke-width="1"/>
  
  <!-- Kurbelstummel (abgebrochen) -->
  <circle cx="200" cy="80" r="10" fill="#505050"/>
  <rect x="200" cy="80" width="15" height="4" fill="#606060" transform="rotate(45 200 80)"/>

  <!-- Hörer mit Stoffanschluss -->
  <path d="M50 140 L80 140 Q90 135 100 140 L120 140 Q125 150 120 160 L100 160 Q90 155 80 160 L50 160 Q45 150 50 140 Z" fill="#101010"/>
  
  <!-- Stoffumflechtung (detailliert) -->
  <path d="M120 145 Q123 148 120 150 Q117 152 120 155" 
        stroke="#5a3e2a" 
        stroke-width="8" 
        fill="none"/>
  <path d="M120 145 Q123 148 120 150 Q117 152 120 155" 
        stroke="#7a5a3a" 
        stroke-width="6" 
        fill="none" 
        stroke-dasharray="1,4"/>

  <!-- Rotes Feldkabel (30% der Fläche) -->
  <path d="M130 150 
           C160 120 190 170 220 130
           C250 90 270 150 290 110" 
        stroke="#b00a0a" 
        stroke-width="7" 
        fill="none">
    <animate attributeName="stroke-dashoffset" values="0;25" dur="4s" repeatCount="indefinite"/>
  </path>
  <path d="M130 150 
           C160 120 190 170 220 130
           C250 90 270 150 290 110" 
        stroke="#800000" 
        stroke-width="9" 
        fill="none"
        stroke-dasharray="1,12" opacity="0.3"/>

  <!-- M2Crypto-Logo im Militärstil -->
  <rect x="80" y="80" width="140" height="40" fill="#d0d0d0" rx="2" stroke="#a0a0a0" stroke-width="1"/>
  <text x="150" y="105" font-family="Courier New" font-size="20" font-weight="bold" text-anchor="middle" fill="#000">M2CRYPTO</text>
  <text x="150" y="125" font-family="Arial" font-size="10" text-anchor="middle" fill="#505050">SECURE FIELD PHONE</text>
  
  <!-- Authentische Schrauben -->
  <g transform="translate(50,40)">
    <circle cx="0" cy="0" r="3" fill="#505050"/>
    <path d="M0 -3 L0 3 M-3 0 L3 0" stroke="#fff" stroke-width="0.8"/>
  </g>
  <g transform="translate(230,40)">
    <circle cx="0" cy="0" r="3" fill="#505050"/>
    <path d="M0 -3 L0 3 M-3 0 L3 0" stroke="#fff" stroke-width="0.8"/>
  </g>
</svg>
